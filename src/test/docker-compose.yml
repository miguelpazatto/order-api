services:
  db:
    image: postgres:15-alpine
    container_name: orderapi-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: orderapi-db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: