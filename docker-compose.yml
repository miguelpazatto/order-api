services:
  db:
    image: postgres:15-alpine
    container_name: orderapi-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 123456
      POSTGRES_DB: orderapi_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: